services:
  obsidian-rag:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./rag.toml:/app/rag.toml:ro
    environment:
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - RAG_API_HOST=0.0.0.0
      - RAG_API_API_KEY=${RAG_API_KEY:-}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

minimum_pre_commit_version: "3.2.0"

default_stages: [pre-commit]

exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    env/|
    __pycache__/|
    \.mypy_cache/|
    \.pytest_cache/|
    \.ruff_cache/|
    dist/|
    build/|
    node_modules/|
    \.tox/|
    \.cache/|
    data/|
    models/|
    qdrant_storage/|
    storage/|
    embeddings/|
    .*\.parquet|
    .*\.sqlite|
    .*\.db
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args:
          - "-c"
          - "pyproject.toml"
          - "-r"
          - "."
        additional_dependencies: ["bandit[toml]"]

  # ── Lint (espelha CI: ruff check) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        files: ^obsidian_rag/

  # ── Type-check (espelha CI: mypy) ────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy type-check
        entry: mypy obsidian_rag/
        language: system
        pass_filenames: false
        types: [python]

  # ── Security ─────────────────────────────────────────────────────────────
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.162.0
    hooks:
      - id: semgrep
        args:
          - "--config"
          - "p/python"
          - "--config"
          - "p/security-audit"
          - "--error"
          - "--skip-unknown-extensions"

  # ── Testes (pre-push — espelha CI: pytest + cobertura) ───────────────────
  - repo: local
    hooks:
      - id: pytest-ci
        name: pytest (pre-push gate)
        entry: pytest tests/ -q --tb=short --cov=obsidian_rag --cov-report=term-missing --cov-fail-under=30
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

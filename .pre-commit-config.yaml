minimum_pre_commit_version: "3.2.0"

default_stages: [pre-commit]

exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    env/|
    __pycache__/|
    \.mypy_cache/|
    \.pytest_cache/|
    \.ruff_cache/|
    dist/|
    build/|
    node_modules/|
    \.tox/|
    \.cache/|
    data/|
    models/|
    chroma/|
    chromadb/|
    qdrant_storage/|
    storage/|
    embeddings/|
    .*\.parquet|
    .*\.sqlite|
    .*\.db
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args:
          - "-c"
          - "pyproject.toml"
          - "-r"
          - "."
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/semgrep/pre-commit
    rev: v1.162.0
    hooks:
      - id: semgrep
        args:
          - "--config"
          - "p/python"
          - "--config"
          - "p/security-audit"
          - "--error"
          - "--skip-unknown-extensions"

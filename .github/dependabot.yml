version: 2
updates:
  # ── Python dependencies (pip) ───────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      # Bump all FastAPI-related packages together
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "httpx"
          - "slowapi"
          - "pydantic*"
      # Bump all dev/testing tools together
      dev-tools:
        patterns:
          - "pytest*"
          - "coverage"
          - "mypy"
          - "ruff"
      # ChromaDB + NetworkX together (graph + vector store)
      data-layer:
        patterns:
          - "chromadb"
          - "networkx"

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

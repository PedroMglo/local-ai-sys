name: Docker — Build & Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker build & sanity check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: obsidian-rag:ci
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker compose config
        run: docker compose config

      - name: Verify package importable in container
        run: |
          docker run --rm obsidian-rag:ci python -c "
          import obsidian_rag
          print('obsidian_rag version:', obsidian_rag.__version__)
          "

      - name: CLI help works inside container
        run: docker run --rm obsidian-rag:ci rag --help

      - name: Check container user is non-root
        run: |
          USER_ID=$(docker run --rm obsidian-rag:ci id -u)
          if [ "$USER_ID" = "0" ]; then
            echo "ERROR: Container corre como root"
            exit 1
          fi
          echo "OK: Container corre como UID $USER_ID"

      - name: Health endpoint responds (sem Ollama)
        run: |
          # Arrancar container em background (api_key obrigatória com host=0.0.0.0)
          CID=$(docker run -d --name rag-health-test \
            -e RAG_API_HOST=0.0.0.0 \
            -e RAG_API_PORT=8000 \
            -e RAG_API_API_KEY=ci-test-key \
            -p 18484:8000 \
            obsidian-rag:ci)

          # Aguardar arranque (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18484/health > /dev/null 2>&1; then
              echo "OK: /health respondeu após ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: /health não respondeu em 30s"
              docker logs "$CID"
              docker stop "$CID" && docker rm "$CID"
              exit 1
            fi
            sleep 1
          done

          # Validar resposta
          RESP=$(curl -sf http://localhost:18484/health)
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"status":"ok"'

          # Cleanup
          docker stop "$CID" && docker rm "$CID"

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── Validação (reutiliza CI) ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Build do pacote Python ────────────────────────────────────────────────
  build:
    name: Build Python package
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: List dist/
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ── GitHub Release ────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ── Docker image (build-only, sem push) ───────────────────────────────────
  docker-release:
    name: Docker image (build-only)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: obsidian-rag:${{ steps.version.outputs.VERSION }}
          push: false
          # Para publicar em ghcr.io, adicionar secrets e descomentar:
          # push: ${{ secrets.GHCR_TOKEN != '' }}
          # Adicionar login step com ghcr.io antes deste step

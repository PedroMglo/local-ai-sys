name: CI — Lint · Test · CLI · Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + type-check (gate rápido, Ubuntu only) ─────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check obsidian_rag/

      - name: Mypy type-check
        run: mypy obsidian_rag/

  # ── Testes (Linux · macOS · Windows × Python 3.11/3.12) ──────────────────
  test:
    name: Tests (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: >
          pytest tests/ -q --tb=short
          --cov=obsidian_rag
          --cov-report=term-missing
          --cov-fail-under=30

  # ── CLI smoke test (todos os OS, sem Ollama) ──────────────────────────────
  cli-smoke:
    name: CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: rag --help
        run: rag --help

      - name: rag init --help
        run: rag init --help

      - name: rag sync --help
        run: rag sync --help

      - name: rag query --help
        run: rag query --help

      - name: rag chat --help
        run: rag chat --help

      - name: rag backup --help
        run: rag backup --help

      - name: rag schedule --help
        run: rag schedule --help

      - name: rag graph --help
        run: rag graph --help

      # doctor/serve/up podem tentar carregar settings sem rag.toml
      - name: rag doctor --help
        shell: bash
        run: rag doctor --help 2>&1; true

      - name: rag serve --help
        shell: bash
        run: rag serve --help 2>&1; true

      - name: rag up --help
        shell: bash
        run: rag up --help 2>&1; true

  # ── Validação específica de config + vault_sync ───────────────────────────
  config-tests:
    name: Config & vault_sync tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run config + security + vault_sync tests
        run: >
          pytest tests/test_init.py tests/test_security.py
          tests/test_vault_sync.py -v --tb=short

  # ── Auditoria de segurança (ficheiros versionados) ────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .env não está versionado
        shell: bash
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env está versionado — remove com: git rm --cached .env"
            exit 1
          fi
          echo "OK: .env não está versionado"

      - name: Sem secrets hardcoded em obsidian_rag/
        shell: bash
        run: |
          if grep -rn --include="*.py" \
            -E '(api_key|password|secret|token)\s*=\s*["'"'"'][A-Za-z0-9+/_-]{16,}["'"'"']' \
            obsidian_rag/ 2>/dev/null | grep -v '#'; then
            echo "ERROR: Possível secret hardcoded detectado"
            exit 1
          fi
          echo "OK: Sem secrets hardcoded"

      - name: .gitignore cobre .env
        shell: bash
        run: |
          if ! grep -qE '^\.env($|\..*)' .gitignore 2>/dev/null; then
            echo "ERROR: .gitignore não cobre .env"
            exit 1
          fi
          echo "OK: .gitignore cobre .env"

      - name: Docker Compose host binding
        shell: bash
        run: |
          if grep -q "0\.0\.0\.0" docker-compose.yml 2>/dev/null; then
            if grep -q "RAG_API_API_KEY" docker-compose.yml 2>/dev/null; then
              echo "OK: 0.0.0.0 com RAG_API_API_KEY configurado"
            else
              echo "WARN: docker-compose.yml usa 0.0.0.0 sem RAG_API_API_KEY explícito"
            fi
          else
            echo "OK: sem binding 0.0.0.0 directo"
          fi

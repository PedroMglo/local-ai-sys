name: CI — Lint · Test · CLI · Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint + type-check (gate rápido, Ubuntu only) ─────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check obsidian_rag/

      - name: Mypy type-check
        run: mypy obsidian_rag/

  # ── Testes (Linux · macOS · Windows × Python 3.11/3.12) ──────────────────
  test:
    name: Tests (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: >
          pytest tests/ -q --tb=short
          --cov=obsidian_rag
          --cov-report=term-missing
          --cov-fail-under=30

  # ── CLI smoke test (todos os OS, sem Ollama) ──────────────────────────────
  cli-smoke:
    name: CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: rag --help
        run: rag --help

      - name: rag init --help
        run: rag init --help

      - name: rag sync --help
        run: rag sync --help

      - name: rag query --help
        run: rag query --help

      - name: rag chat --help
        run: rag chat --help

      - name: rag backup --help
        run: rag backup --help

      - name: rag schedule --help
        run: rag schedule --help

      - name: rag graph --help
        run: rag graph --help

      # doctor/serve/up podem tentar carregar settings sem rag.toml
      - name: rag doctor --help
        shell: bash
        run: rag doctor --help 2>&1; true

      - name: rag serve --help
        shell: bash
        run: rag serve --help 2>&1; true

      - name: rag up --help
        shell: bash
        run: rag up --help 2>&1; true

  # ── Validação específica de config + vault_sync ───────────────────────────
  config-tests:
    name: Config & vault_sync tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run config + security + vault_sync tests
        run: >
          pytest tests/test_init.py tests/test_security.py
          tests/test_vault_sync.py -v --tb=short

  # ── Segurança CI: replica pre-commit + auditoria de dependências ─────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pip install pre-commit pip-audit

      - name: Run pre-commit security hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Audit Python dependencies with pip-audit
        run: pip-audit --format=json --output=pip-audit-report.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 14

      - name: Dependency Review
        if: github.event_name == 'pull_request' && github.repository_visibility == 'public'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

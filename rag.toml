# Obsidian RAG — Configuração Central
# Gerado por: rag init
# Todas as opções podem ser overridden via env vars com prefixo RAG_
# Ex: RAG_RETRIEVAL_TOP_K=15 sobrepõe [retrieval] top_k

[paths]
source_dir = "source"           # staging dir (usado apenas quando sync.backend ≠ direct)
data_dir = "data/chroma"
vault_dir = "~/Obsidian/Vault"       # fonte principal dos dados Obsidian

[sync]
# Backend de sincronização do Vault:
#   direct — lê directamente de vault_dir (default, cross-platform, sem cópia)
#   python — copia vault_dir → source_dir com shutil (cross-platform, incremental)
#   rsync  — usa rsync para copiar (Linux/macOS, mais rápido para vaults grandes)
#   auto   — rsync se disponível, senão python
backend = "direct"
delete_missing = true           # remover de source_dir ficheiros apagados do vault
follow_symlinks = false

[ollama]
base_url = "http://localhost:11434"
embedding_model = "bge-m3"

[chunking]
max_chars = 2000
overlap_chars = 200
min_chars = 50
strip_frontmatter = true
contextual_prefix = true

[retrieval]
top_k = 10
score_threshold = 0.45
dynamic_threshold_ratio = 0.75
embedding_cache_size = 128
context_mode = "auto"
token_budget = 4000
graph_max_neighbors = 5
graph_max_communities = 3
graph_cache_ttl = 300

[api]
host = "127.0.0.1"
port = 8484
query_top_k = 10
api_key = ""
rate_limit = 60
chat_rate_limit = 20

[models]
"deepseek-r1-pt:latest" = true
"gemma3-pt:latest" = true
"qwen3-pt:latest" = true
"gemma3:4b" = true
"qwen3:8b" = true
"deepseek-r1:8b" = true
"coder-pt:latest" = false
"qwen2.5-coder:7b" = false

[router]
enabled = true
model = "gemma3:4b"
timeout = 15.0

[reranker]
enabled = false
model = "gemma3:4b"
top_k_candidates = 30
min_score = 0.3

[context_policy]
min_relevance_score = 0.50
min_relevant_chunks = 1
log_weak_context = true

[debug]
enabled = false
log_to_file = false
log_level = "INFO"
log_format = "text"

[pipeline]
max_workers = 4

[repos]
paths = ["[1", "/home/pmglourenco/Projects/GCP", "/home/pmglourenco/Projects/Git_Concepts", "/home/pmglourenco/Projects/Python_Stud", "/home/pmglourenco/Projects/speech-lab", "/home/pmglourenco/ai-local/SPEECH-LAB", "7]"]
collection_name = "code_repos"

[repos.chunking]
strategy = "ast"
max_chars = 2000
overlap_chars = 200
min_chars = 80
contextual_prefix = true

[graphify]
enabled = false
backend = "ollama"
model = ""
output_dir = "data/graphify"
graph_vault_dir = "~/Obsidian/knowledge-graphs"
auto_update = false

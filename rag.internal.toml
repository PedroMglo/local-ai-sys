# Obsidian RAG — Configuração Interna / Defaults
# Não edites este ficheiro directamente. Usa rag.user.toml para overrides.
# Todas as opções podem ser overridden via env vars com prefixo RAG_
# Ex: RAG_RETRIEVAL_TOP_K=15 sobrepõe [retrieval] top_k

[paths]
source_dir = "source"           # staging dir (usado apenas quando sync.backend ≠ direct)
data_dir = "data/qdrant"        # relativo à raiz do projeto

[sync]
delete_missing = true
follow_symlinks = false

[chunking]
max_chars = 2000
overlap_chars = 200
min_chars = 50
strip_frontmatter = true
contextual_prefix = true

[retrieval]
score_threshold = 0.45
dynamic_threshold_ratio = 0.75
embedding_cache_size = 128
# Graph context: max vizinhos por nó e max comunidades no contexto
graph_max_neighbors = 5
graph_max_communities = 3
# TTL em segundos para cache do graph.json em memória (fallback de invalidação)
graph_cache_ttl = 300

[router]
# Timeout máximo em segundos para a chamada LLM do router
timeout = 15.0

[reranker]
# Quantos candidatos avaliar (top_k_candidates > top_k final)
top_k_candidates = 30
# Score mínimo do reranker (0.0–1.0)
min_score = 0.3

# =============================================================================
# CONTEXT POLICY — política de injecção de contexto
# =============================================================================
[context_policy]
min_relevance_score = 0.50
min_relevant_chunks = 1
log_weak_context = true

# =============================================================================
# PIPELINE — opções de sincronização
# =============================================================================
[pipeline]
max_workers = 4
# Motor de execução do pipeline:
#   local — ProcessPoolExecutor (default, sem dependências extras)
#   dask  — Dask distributed (requer: pip install obsidian-rag[dask])
engine = "local"
# Endereço do Dask scheduler (vazio = cria cluster local temporário)
dask_scheduler = ""

# =============================================================================
# PERFORMANCE — auto-tuning e limites de recursos
# =============================================================================
[performance]
auto_tune = true
max_cpu_percent = 75
max_memory_percent = 70
max_parallel_jobs = 4
embedding_batch_size = 50
embedding_timeout = 120
query_timeout_seconds = 30
graph_timeout = 900
enrich_timeout = 180
graph_parallel_jobs = 2
parser_workers = 1
embedding_batch_max_chars = 60000
chunks_queue_max = 64
files_queue_max = 128
pause_memory_percent = 80
abort_memory_percent = 90
max_swap_percent = 40
pause_swap_percent = 60
abort_swap_percent = 80

# =============================================================================
# VECTOR STORE — backend de armazenamento vectorial
# =============================================================================
[store]
backend = "qdrant"

# =============================================================================
# REPOSITÓRIOS GIT — indexação de código no Qdrant
# =============================================================================
[repos]
collection_name = "code_repos"

[repos.chunking]
strategy = "ast"
max_chars = 2000
overlap_chars = 200
min_chars = 80
contextual_prefix = true

# =============================================================================
# GRAPHIFY — knowledge graph estrutural dos repos
# =============================================================================
[graphify]
output_dir = "data/graphify"
